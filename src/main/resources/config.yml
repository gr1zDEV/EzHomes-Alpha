# EzHome Configuration
# Legacy key is kept for compatibility with older versions.
gui-title: "&6&lHomes"

# New GUI config section
# Any color codes here use '&' formatting.
gui:
  title: "&6&lHomes"
  size: 27
  team-slots: 2
  team-slot-indexes: [10, 19]

  # Bed row (homes): Slot 11, 13, 14, 15, 16, 17
  home-slots: [11, 13, 14, 15, 16, 17]

  # Dye row directly underneath each bed.
  home-action-slots: [20, 22, 23, 24, 25, 26]

  team-item:
    material: RED_DYE
    name: "&c&lTeams"
    lore:
      - "&7Coming Soon..."

  home-item:
    material: GREEN_BED
    name: "&a&l{name}"
    lore:
      - "&7World: &f{world}"
      - "&7X: &f{x} &7Y: &f{y} &7Z: &f{z}"
      - "&eClick to teleport"

  home-action-item:
    material: GREEN_DYE
    name: "&aDelete {name}"
    lore:
      - "&7Click to open delete confirmation."

  empty-home-item:
    material: GRAY_BED
    name: "&7Unused Home Slot"
    lore:
      - "&7Use /home create <name>"

  empty-home-action-item:
    material: GRAY_DYE
    name: "&7Unused Action"
    lore:
      - "&7Create a home to enable this action"

  locked-home-item:
    material: RED_BED
    name: "&cLocked Slot"
    lore:
      - "&7Purchase more home slots!"

  locked-home-action-item:
    material: RED_DYE
    name: "&cLocked Action"
    lore:
      - "&7Unlock more home slots first"

  delete-confirmation:
    title: "&cDelete Home?"
    filler-item:
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    confirm-item:
      material: RED_DYE
      name: "&cConfirm Delete: {name}"
      lore:
        - "&7This cannot be undone."
    cancel-item:
      material: LIME_DYE
      name: "&aCancel"
      lore:
        - "&7Return to your homes menu."

  # Extra decorative or utility items you can place anywhere in the GUI.
  # Each item supports: slot, material, name, lore.
  static-items:
    - slot: 0
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 1
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 2
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 3
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 4
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 5
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 6
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 7
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 8
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 9
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 12
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 18
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 21
      material: GRAY_STAINED_GLASS_PANE
      name: " "

default-home-limit: 1
team-slots: 2
messages:
  home-created: "&aHome &f{name} &acreated!"
  home-deleted: "&cHome &f{name} &cdeleted."
  home-limit-reached: "&cYou've reached your home limit! ({max})"
  home-already-exists: "&cA home named &f{name} &calready exists."
  home-not-found: "&cHome &f{name} &cnot found."
  teleporting: "&eTeleporting to &f{name}&e..."
