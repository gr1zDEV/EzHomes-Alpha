# EzHome Configuration
# Legacy key is kept for compatibility with older versions.
gui-title: "&6&lHomes"

# New GUI config section
# Any color codes here use '&' formatting.
gui:
  title: "&6&lHomes"
  size: 27
  team-slots: 2
  team-slot-indexes: [10, 19]

  # Slots that should display player homes. Any slot not listed here can be
  # used for decorative/static items to build a fixed layout.
  home-slots: [12, 13, 14, 15, 16, 21, 22, 23, 24, 25]

  team-item:
    material: RED_DYE
    name: "&c&lTeams"
    lore:
      - "&7Coming Soon..."

  home-item:
    material: LIGHT_BLUE_BED
    name: "&b&l{name}"
    lore:
      - "&7World: &f{world}"
      - "&7X: &f{x} &7Y: &f{y} &7Z: &f{z}"
      - "&eClick to teleport"
      - "&cShift+Click to delete"

  empty-home-item:
    material: GRAY_STAINED_GLASS_PANE
    name: "&7Empty Home Slot"
    lore:
      - "&7Use /home create <name>"

  locked-home-item:
    material: TRIPWIRE_HOOK
    name: "&8Locked"
    lore:
      - "&7Purchase more home slots!"

  # Extra decorative or utility items you can place anywhere in the GUI.
  # Each item supports: slot, material, name, lore.
  static-items:
    - slot: 0
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 1
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 2
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 3
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 4
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 5
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 6
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 7
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 8
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 9
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 11
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 17
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 18
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 20
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    - slot: 26
      material: GRAY_STAINED_GLASS_PANE
      name: " "

default-home-limit: 1
team-slots: 2
messages:
  home-created: "&aHome &f{name} &acreated!"
  home-deleted: "&cHome &f{name} &cdeleted."
  home-limit-reached: "&cYou've reached your home limit! ({max})"
  home-already-exists: "&cA home named &f{name} &calready exists."
  home-not-found: "&cHome &f{name} &cnot found."
  teleporting: "&eTeleporting to &f{name}&e..."
